<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ARgift — Open your gift ✦</title>

  <!-- Mind AR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9932a;
      --gold-light: #f0c060;
      --ink: #0a0f1e;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

    /* ---- Loading Screen ---- */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      font-size: 40px; color: var(--gold-light);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { text-shadow: 0 0 20px rgba(240,192,96,0.4); }
      50% { text-shadow: 0 0 60px rgba(240,192,96,0.9), 0 0 100px rgba(240,192,96,0.4); }
    }
    .loading-title {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      color: #fff; letter-spacing: -0.5px;
    }
    #loading-status {
      font-size: 14px; color: rgba(255,255,255,0.45);
      text-align: center; padding: 0 32px; line-height: 1.6;
      min-height: 44px;
    }
    .loading-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    /* ---- Camera Permission Request ---- */
    #permission-screen {
      position: fixed; inset: 0; z-index: 900;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      padding: 32px;
      display: none;
    }
    .perm-icon { font-size: 56px; }
    .perm-title { font-family: var(--font-display); font-size: 26px; color: #fff; text-align: center; }
    .perm-desc { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.7; max-width: 300px; }
    #btn-allow-camera {
      background: linear-gradient(135deg, var(--gold), #e8a830);
      color: #fff; border: none; border-radius: 40px;
      padding: 16px 40px; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body);
      box-shadow: 0 8px 24px rgba(201,147,42,0.4);
      transition: all 0.2s;
    }
    #btn-allow-camera:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,147,42,0.5); }

    /* ---- Scan Overlay ---- */
    #scan-hint {
      position: fixed; inset: 0;
      z-index: 50;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 52px;
    }

    /* Corner brackets on the full screen */
    .scan-corner {
      position: fixed;
      width: 44px; height: 44px;
    }
    .scan-corner.tl { top: 24px; left: 20px;
      border-top: 3px solid var(--gold); border-left: 3px solid var(--gold); border-radius: 8px 0 0 0; }
    .scan-corner.tr { top: 24px; right: 20px;
      border-top: 3px solid var(--gold); border-right: 3px solid var(--gold); border-radius: 0 8px 0 0; }
    .scan-corner.bl { bottom: 100px; left: 20px;
      border-bottom: 3px solid var(--gold); border-left: 3px solid var(--gold); border-radius: 0 0 0 8px; }
    .scan-corner.br { bottom: 100px; right: 20px;
      border-bottom: 3px solid var(--gold); border-right: 3px solid var(--gold); border-radius: 0 0 8px 0; }

    /* Sweep line across the full screen */
    .scan-sweep {
      position: fixed;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--gold-light) 50%, var(--gold) 60%, transparent 100%);
      animation: sweep 2.2s ease-in-out infinite;
      box-shadow: 0 0 12px 2px rgba(201,147,42,0.5);
    }
    @keyframes sweep {
      0%   { top: 24px; opacity: 0; }
      5%   { opacity: 1; }
      90%  { top: calc(100vh - 104px); opacity: 1; }
      100% { top: calc(100vh - 104px); opacity: 0; }
    }

    /* Status pill at bottom */
    .scan-status-row {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 9px 18px; border-radius: 30px;
    }
    .scan-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    .scan-label {
      font-size: 13px; color: rgba(255,255,255,0.85);
      letter-spacing: 0.3px;
    }

    /* Found flash */
    #found-flash {
      position: fixed; inset: 0; z-index: 55;
      background: rgba(201,147,42,0.25);
      pointer-events: none;
      opacity: 0;
    }
    #found-flash.flash {
      animation: found-anim 0.5s ease forwards;
    }
    @keyframes found-anim {
      0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; }
    }

    /* ---- CTA bar ---- */
    #cta-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 60;
      padding: 16px 24px 36px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.65));
      pointer-events: none;
      opacity: 0; transform: translateY(16px);
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    #cta-bar.visible { opacity: 1; transform: translateY(0); pointer-events: all; }

    /* ---- AR Overlay UI ---- */
    #ar-overlay {
      position: fixed; inset: 0; z-index: 40;
      pointer-events: none;
      display: none;
    }
    #ar-overlay.active { display: block; }

    /* CTA Button */
    #cta-container {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      pointer-events: all;
      display: none;
      flex-direction: column; align-items: center; gap: 12px;
      animation: slide-up 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #cta-container.visible { display: flex; }
    @keyframes slide-up {
      from { transform: translateX(-50%) translateY(40px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    #btn-cta {
      background: linear-gradient(135deg, var(--gold), #e8a830);
      color: #fff; border: none; border-radius: 40px;
      padding: 15px 36px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 4px 16px rgba(201,147,42,0.4);
      white-space: nowrap; max-width: 280px;
      transition: all 0.2s;
    }
    #btn-cta:hover { transform: scale(1.03); }

    .ar-secondary-btns {
      display: flex; gap: 12px;
    }
    .ar-sec-btn {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 30px;
      padding: 9px 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    .ar-sec-btn:hover { background: rgba(255,255,255,0.25); }

    /* Header bar */
    #ar-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      pointer-events: all;
    }
    .ar-brand {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 6px 14px;
    }
    .ar-brand-star { color: var(--gold-light); font-size: 14px; }
    .ar-brand-name { font-family: var(--font-display); color: #fff; font-size: 14px; font-weight: 600; }

    /* Error Screen */
    #error-screen {
      position: fixed; inset: 0; z-index: 800;
      background: var(--ink);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px;
    }
    #error-screen.visible { display: flex; }
    .error-icon { font-size: 48px; }
    .error-title { font-family: var(--font-display); font-size: 24px; color: #fff; }
    #error-message { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.6; max-width: 300px; }
    .error-retry {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; border-radius: 30px; padding: 12px 28px;
      font-size: 14px; cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    .error-retry:hover { background: rgba(255,255,255,0.2); }

    /* Camera feed — sits at the very back */
    #camera-feed {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* A-Frame sits on top of camera feed, canvas must be transparent */
    #aframe-container { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
    a-scene { position: fixed !important; inset: 0 !important; background: transparent !important; }
    a-scene canvas { background: transparent !important; }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo">✦</div>
  <div class="loading-title">ARgift</div>
  <div id="loading-status">Loading your gift experience…</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
</div>

<!-- Camera Permission -->
<div id="permission-screen">
  <div class="perm-icon">📷</div>
  <div class="perm-title">Allow Camera Access</div>
  <p class="perm-desc">To open your AR gift, we need your camera. We don't record or store anything.</p>
  <button id="btn-allow-camera">Allow Camera →</button>
</div>

<!-- Error Screen -->
<div id="error-screen">
  <div class="error-icon">⚠️</div>
  <div class="error-title">Something went wrong</div>
  <p id="error-message">Unable to load your gift experience.</p>
  <button class="error-retry" onclick="location.reload()">Try again</button>
</div>

<!-- Our camera feed (always visible behind UI) -->
<video id="camera-feed" autoplay playsinline webkit-playsinline muted></video>

<!-- Found flash -->
<div id="found-flash"></div>

<!-- Scan Overlay (shown while scanning) -->
<div id="scan-hint">
  <div class="scan-corner tl"></div>
  <div class="scan-corner tr"></div>
  <div class="scan-corner bl"></div>
  <div class="scan-corner br"></div>
  <div class="scan-sweep"></div>
  <div class="scan-status-row">
    <div class="scan-dot"></div>
    <span class="scan-label" id="scan-label-text">Scanning for product…</span>
  </div>
</div>

<!-- A-Frame AR Scene (built dynamically) -->
<div id="aframe-container"></div>

<!-- CTA bar (slides up when marker found) -->
<div id="cta-bar">
  <button id="btn-cta" style="display:none">Open Gift</button>
  <div class="ar-secondary-btns">
    <button class="ar-sec-btn" id="btn-replay">↺ Replay</button>
    <button class="ar-sec-btn" id="btn-share">⇧ Share</button>
  </div>
</div>

<script type="module">
// ─── Config ──────────────────────────────────────────────────────────────────
const SUPABASE_URL = '__SUPABASE_URL__'
const SUPABASE_KEY = '__SUPABASE_ANON_KEY__'

// ─── State ────────────────────────────────────────────────────────────────────
let experience = null, sceneEl = null

const $ = id => document.getElementById(id)
function setStatus(msg, pct) {
  $('loading-status').textContent = msg
  if (pct !== undefined) $('loading-bar').style.width = pct + '%'
}
function showError(msg) {
  $('error-screen').classList.add('visible')
  $('error-message').textContent = msg
  $('loading-screen').classList.add('hidden')
}

// ─── 1. Fetch experience ──────────────────────────────────────────────────────
async function fetchExperience(pid) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/experiences?product_id=eq.${encodeURIComponent(pid)}&select=*`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  )
  if (!res.ok) throw new Error('Failed to fetch experience data')
  const data = await res.json()
  if (!data.length) throw new Error('No AR experience found for this product.')
  return data[0]
}

// ─── 2. Preload media (called on user gesture so autoplay is unlocked) ────────
let preloadedVideo = null
function preloadMedia(exp) {
  if (exp.experience_type !== 'video' || !exp.media_url) return
  const v = document.createElement('video')
  v.id = 'preloaded-video'
  v.src = exp.media_url
  v.loop = true
  v.muted = true
  v.playsInline = true
  v.setAttribute('playsinline', '')
  v.setAttribute('webkit-playsinline', '')
  v.preload = 'auto'
  v.style.display = 'none'
  document.body.appendChild(v)
  v.play().catch(() => {}) // silent muted play — unlocks autoplay token
  preloadedVideo = v
}

// ─── 3. Build AR scene — content locked to marker bounds ─────────────────────
function buildARScene(exp) {
  const markerUrl = exp.marker_url || 'targets/default.mind'
  // Plane dimensions: width always 1 (MindAR unit = marker width)
  // height = marker aspect ratio (height/width) so content fills marker exactly
  const ar = parseFloat(exp.marker_aspect_ratio) || 1
  const planeW = 1
  const planeH = ar  // e.g. portrait A4 ≈ 1.414, landscape 16:9 ≈ 0.5625

  const scene = document.createElement('a-scene')
  scene.setAttribute('mindar-image',
    `imageTargetSrc: ${markerUrl}; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; warmupTolerance: 5; missTolerance: 5`)
  scene.setAttribute('renderer', 'colorManagement: true; alpha: true')
  scene.setAttribute('vr-mode-ui', 'enabled: false')
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false')

  // ── Assets ──────────────────────────────────────────────────────────────────
  const assets = document.createElement('a-assets')
  assets.setAttribute('timeout', '20000')

  if (exp.experience_type === 'video' && exp.media_url) {
    const vid = document.createElement('video')
    vid.id = 'ar-video'
    vid.src = exp.media_url
    vid.loop = true
    vid.muted = true          // start muted so autoplay works
    vid.playsInline = true
    vid.setAttribute('playsinline', '')
    vid.setAttribute('webkit-playsinline', '')
    vid.setAttribute('crossorigin', 'anonymous')
    vid.preload = 'auto'
    assets.appendChild(vid)
  }
  scene.appendChild(assets)

  // ── Camera ──────────────────────────────────────────────────────────────────
  const cam = document.createElement('a-camera')
  cam.setAttribute('active', 'false')
  cam.setAttribute('position', '0 0 0')
  scene.appendChild(cam)

  // ── Target entity ────────────────────────────────────────────────────────────
  const target = document.createElement('a-entity')
  target.setAttribute('mindar-image-target', 'targetIndex: 0')

  const tpl = {
    golden:   { color: '#f0c060', bg: '#1a0a00' },
    midnight: { color: '#c8d8ff', bg: '#0a0f1e' },
    sakura:   { color: '#4a1530', bg: '#ffd6e7' },
    forest:   { color: '#c8f5c8', bg: '#1a3a1a' },
  }[exp.template_id] || { color: '#f0c060', bg: '#000' }

  // ── Gold border frame (slightly larger than content) ──────────────────────
  const border = document.createElement('a-plane')
  border.setAttribute('data-border', '')
  border.setAttribute('width',  planeW + 0.04)
  border.setAttribute('height', planeH + 0.04)
  border.setAttribute('position', '0 0 -0.001')
  border.setAttribute('material', 'color: #c9932a; shader: flat; side: double')
  target.appendChild(border)

  // ── Content ───────────────────────────────────────────────────────────────
  if (exp.experience_type === 'video' && exp.media_url) {
    const el = document.createElement('a-video')
    el.setAttribute('data-content', '')
    el.setAttribute('src', '#ar-video')
    el.setAttribute('width', planeW)
    el.setAttribute('height', planeH)
    el.setAttribute('position', '0 0 0.001')
    target.appendChild(el)
  }

  if (exp.experience_type === 'photo') {
    const url = exp.media_urls?.[0] || exp.media_url
    if (url) {
      const el = document.createElement('a-plane')
      el.setAttribute('data-content', '')
      el.setAttribute('src', url)
      el.setAttribute('width', planeW)
      el.setAttribute('height', planeH)
      el.setAttribute('position', '0 0 0.001')
      el.setAttribute('material', 'transparent: false; shader: flat')
      target.appendChild(el)
    }
  }

  if (exp.experience_type === 'text') {
    const bg = document.createElement('a-plane')
    bg.setAttribute('data-content', '')
    bg.setAttribute('width', planeW); bg.setAttribute('height', planeH)
    bg.setAttribute('position', '0 0 0')
    bg.setAttribute('material', `color: ${tpl.bg}; opacity: 0.9; transparent: true; shader: flat`)
    target.appendChild(bg)
    const txt = document.createElement('a-text')
    txt.setAttribute('value', exp.text_message || 'A gift for you ✦')
    txt.setAttribute('color', tpl.color)
    txt.setAttribute('align', 'center')
    txt.setAttribute('width', '0.85')
    txt.setAttribute('position', '0 0 0.002')
    txt.setAttribute('wrap-count', '20')
    target.appendChild(txt)
  }

  const light = document.createElement('a-light')
  light.setAttribute('type', 'ambient'); light.setAttribute('intensity', '2')
  scene.appendChild(light)
  scene.appendChild(target)
  $('aframe-container').appendChild(scene)
  return scene
}

// ─── 4. Fullscreen overlay ────────────────────────────────────────────────────
function showOverlay(exp) {
  const overlay = $('media-overlay')
  const vid     = $('overlay-video')
  const img     = $('overlay-photo')
  const txt     = $('overlay-text')

  // reset
  vid.style.display = 'none'
  img.style.display = 'none'
  txt.style.display = 'none'

  if (exp.experience_type === 'video' && exp.media_url) {
    if (preloadedVideo) {
      // Move the preloaded (already-playing) video into the overlay
      preloadedVideo.style.display = 'block'
      preloadedVideo.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;'
      preloadedVideo.muted = false
      preloadedVideo.currentTime = 0
      overlay.insertBefore(preloadedVideo, overlay.firstChild)
    } else {
      vid.src = exp.media_url
      vid.style.display = 'block'
      vid.muted = false
      vid.play().catch(() => { vid.muted = true; vid.play().catch(() => {}) })
    }
  } else if (exp.experience_type === 'photo') {
    img.src = exp.media_urls?.[0] || exp.media_url
    img.style.display = 'block'
  } else if (exp.experience_type === 'text') {
    $('overlay-text-msg').textContent = exp.text_message || 'A gift for you ✦'
    txt.style.display = 'flex'
  }

  // CTA
  const btnCta = $('btn-cta')
  if (exp.cta_label && exp.cta_url) {
    btnCta.textContent = exp.cta_label
    btnCta.style.display = 'inline-flex'
    btnCta.onclick = () => window.open(exp.cta_url, '_blank', 'noopener')
  }

  $('btn-replay').onclick = () => {
    const v = preloadedVideo || vid
    v.currentTime = 0; v.muted = false; v.play().catch(() => {})
  }
  $('btn-share').onclick = async () => {
    if (navigator.share) { try { await navigator.share({ title: 'ARgift', url: location.href }) } catch {} }
    else { navigator.clipboard.writeText(location.href); alert('Link copied!') }
  }
  $('btn-close').onclick = () => {
    overlay.classList.remove('active')
    const v = preloadedVideo || vid
    v.pause()
    $('scan-label-text').textContent = 'Scanning for product…'
    $('scan-hint').style.display = 'flex'
  }

  overlay.classList.add('active')
}

// ─── 5. AR tracking events ────────────────────────────────────────────────────
function setupAREvents(scene, exp) {
  scene.addEventListener('arReady', () => {
    $('loading-screen').classList.add('hidden')
    $('scan-hint').style.display = 'flex'

    // ── Read real aspect ratio from MindAR compiled target ──────────────────
    try {
      const sys = scene.systems['mindar-image-system']
      const t   = sys?.controller?.targets?.[0]
      if (t && t.height && t.width) {
        const realAR = t.height / t.width
        resizeARContent(scene, realAR)
      }
    } catch(e) {}
  })

  scene.addEventListener('arError', () => {
    showError('AR failed. Use Chrome on Android or Safari on iOS.')
  })

  const target = scene.querySelector('[mindar-image-target]')
  if (!target) return

  target.addEventListener('targetFound', () => {
    const flash = $('found-flash')
    flash.classList.remove('flash'); void flash.offsetWidth; flash.classList.add('flash')
    $('scan-label-text').textContent = '✦ Product found!'
    setTimeout(() => { $('scan-hint').style.display = 'none' }, 400)

    // Auto-play video muted → immediately unmute
    if (exp.experience_type === 'video') {
      const vid = document.getElementById('ar-video')
      if (vid) {
        vid.currentTime = 0
        vid.muted = true
        vid.play().then(() => { vid.muted = false }).catch(() => {})
      }
    }
    showCTABar(exp)
  })

  target.addEventListener('targetLost', () => {
    $('scan-label-text').textContent = 'Scanning for product…'
    $('scan-hint').style.display = 'flex'
    if (exp.experience_type === 'video') {
      const v = document.getElementById('ar-video'); if (v) v.pause()
    }
    hideCTABar()
  })
}

// Resize content plane + border to match the real marker aspect ratio
function resizeARContent(scene, ar) {
  const W = 1, H = ar
  const content = scene.querySelector('[mindar-image-target] [data-content]')
  const border  = scene.querySelector('[mindar-image-target] [data-border]')
  if (content) {
    content.setAttribute('width',  W)
    content.setAttribute('height', H)
  }
  if (border) {
    border.setAttribute('width',  W  + 0.04)
    border.setAttribute('height', H  + 0.04)
  }
}

function showCTABar(exp) {
  const bar = $('cta-bar')
  const btnCta = $('btn-cta')
  if (exp.cta_label && exp.cta_url) {
    btnCta.textContent = exp.cta_label
    btnCta.style.display = 'inline-flex'
    btnCta.onclick = () => window.open(exp.cta_url, '_blank', 'noopener')
  }
  $('btn-replay').onclick = () => {
    const v = document.getElementById('ar-video')
    if (v) { v.currentTime = 0; v.muted = false; v.play().catch(() => {}) }
  }
  $('btn-share').onclick = async () => {
    if (navigator.share) { try { await navigator.share({ title: 'ARgift', url: location.href }) } catch {} }
    else { navigator.clipboard.writeText(location.href); alert('Link copied!') }
  }
  bar.classList.add('visible')
}

function hideCTABar() {
  $('cta-bar').classList.remove('visible')
}

// ─── 6. Main ──────────────────────────────────────────────────────────────────
async function main() {
  setStatus('Reading your gift…', 10)
  const pid = new URLSearchParams(location.search).get('pid') ||
              new URLSearchParams(location.search).get('id')
  if (!pid) { showError('No product ID in URL. Please scan the QR code again.'); return }

  setStatus('Fetching experience…', 30)
  try { experience = await fetchExperience(pid) }
  catch (e) { showError(e.message); return }

  setStatus('Ready…', 60)
  $('loading-screen').classList.add('hidden')
  $('permission-screen').style.display = 'flex'
}

async function launchAR() {
  setStatus('Starting camera…', 70)

  // Get camera stream — show it immediately
  let stream
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    })
  } catch {
    showError('Camera access denied. Please allow camera and reload.')
    return
  }
  const feed = $('camera-feed')
  feed.srcObject = stream
  await feed.play().catch(() => {})

  // ★ Preload video NOW while we're inside the user-gesture callback
  preloadMedia(experience)

  setStatus('Loading AR tracker…', 85)
  sceneEl = buildARScene(experience)
  setupAREvents(sceneEl, experience)

  sceneEl.addEventListener('loaded', () => {
    setStatus('Point at your product ✦', 100)
    sceneEl.systems['mindar-image-system']?.start()
  })
}

$('btn-allow-camera').addEventListener('click', async () => {
  $('permission-screen').style.display = 'none'
  $('loading-screen').classList.remove('hidden')
  await launchAR()
})

main()
</script>
