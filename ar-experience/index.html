<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ARgift — Open your gift ✦</title>

  <!-- Mind AR + A-Frame -->
  <script src="https://cdn.jsdelivr.net/npm/aframe@1.4.2/dist/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9932a;
      --gold-light: #f0c060;
      --ink: #0a0f1e;
      --font-display: 'Playfair Display', serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }

    /* ---- Loading Screen ---- */
    #loading-screen {
      position: fixed; inset: 0; z-index: 1000;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px;
      transition: opacity 0.5s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }

    .loading-logo {
      font-size: 40px; color: var(--gold-light);
      animation: pulse-glow 2s ease-in-out infinite;
    }
    @keyframes pulse-glow {
      0%,100% { text-shadow: 0 0 20px rgba(240,192,96,0.4); }
      50% { text-shadow: 0 0 60px rgba(240,192,96,0.9), 0 0 100px rgba(240,192,96,0.4); }
    }
    .loading-title {
      font-family: var(--font-display);
      font-size: 28px; font-weight: 700;
      color: #fff; letter-spacing: -0.5px;
    }
    #loading-status {
      font-size: 14px; color: rgba(255,255,255,0.45);
      text-align: center; padding: 0 32px; line-height: 1.6;
      min-height: 44px;
    }
    .loading-bar-wrap {
      width: 200px; height: 2px;
      background: rgba(255,255,255,0.1);
      border-radius: 1px;
      overflow: hidden;
    }
    .loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold-light));
      border-radius: 1px;
      transition: width 0.3s ease;
    }

    /* ---- Camera Permission Request ---- */
    #permission-screen {
      position: fixed; inset: 0; z-index: 900;
      background: var(--ink);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      padding: 32px;
      display: none;
    }
    .perm-icon { font-size: 56px; }
    .perm-title { font-family: var(--font-display); font-size: 26px; color: #fff; text-align: center; }
    .perm-desc { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.7; max-width: 300px; }
    #btn-allow-camera {
      background: linear-gradient(135deg, var(--gold), #e8a830);
      color: #fff; border: none; border-radius: 40px;
      padding: 16px 40px; font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body);
      box-shadow: 0 8px 24px rgba(201,147,42,0.4);
      transition: all 0.2s;
    }
    #btn-allow-camera:hover { transform: translateY(-2px); box-shadow: 0 12px 32px rgba(201,147,42,0.5); }

    /* ---- Scan Overlay ---- */
    #scan-hint {
      position: fixed; inset: 0;
      z-index: 50;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 52px;
    }

    /* Corner brackets on the full screen */
    .scan-corner {
      position: fixed;
      width: 44px; height: 44px;
    }
    .scan-corner.tl { top: 24px; left: 20px;
      border-top: 3px solid var(--gold); border-left: 3px solid var(--gold); border-radius: 8px 0 0 0; }
    .scan-corner.tr { top: 24px; right: 20px;
      border-top: 3px solid var(--gold); border-right: 3px solid var(--gold); border-radius: 0 8px 0 0; }
    .scan-corner.bl { bottom: 100px; left: 20px;
      border-bottom: 3px solid var(--gold); border-left: 3px solid var(--gold); border-radius: 0 0 0 8px; }
    .scan-corner.br { bottom: 100px; right: 20px;
      border-bottom: 3px solid var(--gold); border-right: 3px solid var(--gold); border-radius: 0 0 8px 0; }

    /* Sweep line across the full screen */
    .scan-sweep {
      position: fixed;
      left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent 0%, var(--gold) 40%, var(--gold-light) 50%, var(--gold) 60%, transparent 100%);
      animation: sweep 2.2s ease-in-out infinite;
      box-shadow: 0 0 12px 2px rgba(201,147,42,0.5);
    }
    @keyframes sweep {
      0%   { top: 24px; opacity: 0; }
      5%   { opacity: 1; }
      90%  { top: calc(100vh - 104px); opacity: 1; }
      100% { top: calc(100vh - 104px); opacity: 0; }
    }

    /* Status pill at bottom */
    .scan-status-row {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.12);
      padding: 9px 18px; border-radius: 30px;
    }
    .scan-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--gold);
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.2; }
    }
    .scan-label {
      font-size: 13px; color: rgba(255,255,255,0.85);
      letter-spacing: 0.3px;
    }

    /* Found flash */
    #found-flash {
      position: fixed; inset: 0; z-index: 55;
      background: rgba(201,147,42,0.25);
      pointer-events: none;
      opacity: 0;
    }
    #found-flash.flash {
      animation: found-anim 0.5s ease forwards;
    }
    @keyframes found-anim {
      0% { opacity: 0; } 30% { opacity: 1; } 100% { opacity: 0; }
    }

    /* ---- Fullscreen Media Overlay ---- */
    #media-overlay {
      position: fixed; inset: 0; z-index: 60;
      background: #000;
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      animation: fade-in 0.4s ease;
    }
    #media-overlay.active { display: flex; }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }

    #overlay-video {
      width: 100%; height: 100%;
      object-fit: cover;
    }
    #overlay-photo {
      width: 100%; height: 100%;
      object-fit: contain;
      display: none;
    }
    #overlay-text {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 40px; text-align: center;
    }
    #overlay-text-msg {
      font-family: var(--font-display);
      font-size: clamp(22px, 6vw, 44px);
      color: var(--gold-light);
      line-height: 1.4;
      text-shadow: 0 0 40px rgba(240,192,96,0.5);
    }
    /* close / CTA row on overlay */
    #overlay-controls {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 24px 24px 40px;
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      background: linear-gradient(transparent, rgba(0,0,0,0.7));
      pointer-events: all;
    }

    /* ---- AR Overlay UI ---- */
    #ar-overlay {
      position: fixed; inset: 0; z-index: 40;
      pointer-events: none;
      display: none;
    }
    #ar-overlay.active { display: block; }

    /* CTA Button */
    #cta-container {
      position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%);
      pointer-events: all;
      display: none;
      flex-direction: column; align-items: center; gap: 12px;
      animation: slide-up 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }
    #cta-container.visible { display: flex; }
    @keyframes slide-up {
      from { transform: translateX(-50%) translateY(40px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    #btn-cta {
      background: linear-gradient(135deg, var(--gold), #e8a830);
      color: #fff; border: none; border-radius: 40px;
      padding: 15px 36px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; font-family: var(--font-body);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 4px 16px rgba(201,147,42,0.4);
      white-space: nowrap; max-width: 280px;
      transition: all 0.2s;
    }
    #btn-cta:hover { transform: scale(1.03); }

    .ar-secondary-btns {
      display: flex; gap: 12px;
    }
    .ar-sec-btn {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 30px;
      padding: 9px 20px; font-size: 13px; font-weight: 500;
      cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    .ar-sec-btn:hover { background: rgba(255,255,255,0.25); }

    /* Header bar */
    #ar-header {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 16px 20px;
      display: flex; align-items: center; justify-content: space-between;
      pointer-events: all;
    }
    .ar-brand {
      display: flex; align-items: center; gap: 8px;
      background: rgba(0,0,0,0.4);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 6px 14px;
    }
    .ar-brand-star { color: var(--gold-light); font-size: 14px; }
    .ar-brand-name { font-family: var(--font-display); color: #fff; font-size: 14px; font-weight: 600; }

    /* Error Screen */
    #error-screen {
      position: fixed; inset: 0; z-index: 800;
      background: var(--ink);
      display: none; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; padding: 32px;
    }
    #error-screen.visible { display: flex; }
    .error-icon { font-size: 48px; }
    .error-title { font-family: var(--font-display); font-size: 24px; color: #fff; }
    #error-message { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.6; max-width: 300px; }
    .error-retry {
      background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; border-radius: 30px; padding: 12px 28px;
      font-size: 14px; cursor: pointer; font-family: var(--font-body);
      transition: all 0.2s;
    }
    .error-retry:hover { background: rgba(255,255,255,0.2); }

    /* Our own camera feed video */
    #camera-feed {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* Hide the A-Frame/MindAR canvas — we only use it for tracking */
    #aframe-container { display: none !important; }
    a-scene { display: none !important; }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="loading-logo">✦</div>
  <div class="loading-title">ARgift</div>
  <div id="loading-status">Loading your gift experience…</div>
  <div class="loading-bar-wrap">
    <div class="loading-bar" id="loading-bar"></div>
  </div>
</div>

<!-- Camera Permission -->
<div id="permission-screen">
  <div class="perm-icon">📷</div>
  <div class="perm-title">Allow Camera Access</div>
  <p class="perm-desc">To open your AR gift, we need your camera. We don't record or store anything.</p>
  <button id="btn-allow-camera">Allow Camera →</button>
</div>

<!-- Error Screen -->
<div id="error-screen">
  <div class="error-icon">⚠️</div>
  <div class="error-title">Something went wrong</div>
  <p id="error-message">Unable to load your gift experience.</p>
  <button class="error-retry" onclick="location.reload()">Try again</button>
</div>

<!-- Our camera feed (always visible behind UI) -->
<video id="camera-feed" autoplay playsinline webkit-playsinline muted></video>

<!-- Found flash -->
<div id="found-flash"></div>

<!-- Scan Overlay (shown while scanning) -->
<div id="scan-hint">
  <div class="scan-corner tl"></div>
  <div class="scan-corner tr"></div>
  <div class="scan-corner bl"></div>
  <div class="scan-corner br"></div>
  <div class="scan-sweep"></div>
  <div class="scan-status-row">
    <div class="scan-dot"></div>
    <span class="scan-label" id="scan-label-text">Scanning for product…</span>
  </div>
</div>

<!-- A-Frame AR Scene (built dynamically) -->
<div id="aframe-container"></div>

<!-- Fullscreen Media Overlay (shown when marker detected) -->
<div id="media-overlay">
  <video id="overlay-video" playsinline webkit-playsinline muted loop></video>
  <img id="overlay-photo" alt="AR content" />
  <div id="overlay-text">
    <p id="overlay-text-msg"></p>
  </div>
  <div id="overlay-controls">
    <button id="btn-cta" style="display:none">Open Gift</button>
    <div class="ar-secondary-btns">
      <button class="ar-sec-btn" id="btn-replay">↺ Replay</button>
      <button class="ar-sec-btn" id="btn-share">⇧ Share</button>
      <button class="ar-sec-btn" id="btn-close">✕ Scan again</button>
    </div>
  </div>
</div>

<script type="module">
// ─── Config ─────────────────────────────────────────────────────────────────
const SUPABASE_URL  = '__SUPABASE_URL__'
const SUPABASE_KEY  = '__SUPABASE_ANON_KEY__'

// ─── State ───────────────────────────────────────────────────────────────────
let productId     = null
let experience    = null
let sceneEl       = null
let targetFound   = false
let ctaShown      = false

// ─── Helpers ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id)
function setLoadingStatus(msg, pct) {
  $('loading-status').textContent = msg
  if (pct !== undefined) $('loading-bar').style.width = pct + '%'
}
function showError(msg) {
  $('error-screen').classList.add('visible')
  $('error-message').textContent = msg
  $('loading-screen').classList.add('hidden')
}

// ─── 1. Parse product ID from URL ────────────────────────────────────────────
function getProductId() {
  const params = new URLSearchParams(location.search)
  return params.get('pid') || params.get('id') || params.get('product')
}

// ─── 2. Fetch experience from Supabase ───────────────────────────────────────
async function fetchExperience(pid) {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/experiences?product_id=eq.${encodeURIComponent(pid)}&select=*`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
  )
  if (!res.ok) throw new Error('Failed to fetch experience data')
  const data = await res.json()
  if (!data.length) throw new Error('No AR experience found for this product. The link may be incorrect or the experience was deleted.')
  return data[0]
}

// ─── 3. Build A-Frame scene ──────────────────────────────────────────────────
function buildScene(exp) {
  const container = document.getElementById('aframe-container')

  // Determine marker target source
  // If the experience has a custom marker, use it; otherwise use a default
  const markerUrl = exp.marker_url || 'targets/default.mind'

  const scene = document.createElement('a-scene')
  scene.setAttribute('mindar-image', `imageTargetSrc: ${markerUrl}; autoStart: false; uiLoading: no; uiScanning: no; uiError: no; filterMinCF: 0.001; filterBeta: 0.01; warmupTolerance: 5; missTolerance: 5`)
  scene.setAttribute('color-space', 'sRGB')
  scene.setAttribute('renderer', 'colorManagement: true; physicallyCorrectLights: true; alpha: true')
  scene.setAttribute('background', 'color: transparent; transparent: true')
  scene.setAttribute('vr-mode-ui', 'enabled: false')
  scene.setAttribute('device-orientation-permission-ui', 'enabled: false')

  const assets = document.createElement('a-assets')
  assets.setAttribute('timeout', '10000')

  if (exp.experience_type === 'video' && exp.media_url) {
    const video = document.createElement('video')
    video.id = 'ar-video'
    video.src = exp.media_url
    video.setAttribute('loop', '')
    video.setAttribute('crossorigin', 'anonymous')
    video.setAttribute('webkit-playsinline', '')
    video.setAttribute('playsinline', '')
    video.setAttribute('preload', 'auto')
    assets.appendChild(video)
  }

  scene.appendChild(assets)

  // Camera
  const camera = document.createElement('a-camera')
  camera.setAttribute('active', 'false')
  camera.setAttribute('position', '0 0 0')
  scene.appendChild(camera)

  // AR target entity
  const mindarImage = document.createElement('a-entity')
  mindarImage.setAttribute('mindar-image-target', 'targetIndex: 0')

  const template = exp.template_id || 'golden'
  const templateConfig = {
    golden:   { color: '#f0c060', font: 'https://cdn.aframe.io/fonts/DejaVu-sdf.fnt', bg: '#1a0a00' },
    midnight: { color: '#c8d8ff', font: 'https://cdn.aframe.io/fonts/DejaVu-sdf.fnt', bg: '#0a0f1e' },
    sakura:   { color: '#4a1530', font: 'https://cdn.aframe.io/fonts/DejaVu-sdf.fnt', bg: '#ffd6e7' },
    forest:   { color: '#c8f5c8', font: 'https://cdn.aframe.io/fonts/DejaVu-sdf.fnt', bg: '#1a3a1a' },
  }[template] || { color: '#f0c060', font: 'https://cdn.aframe.io/fonts/DejaVu-sdf.fnt', bg: '#000' }

  if (exp.experience_type === 'video' && exp.media_url) {
    // Video plane floating above marker
    const videoEl = document.createElement('a-video')
    videoEl.setAttribute('src', '#ar-video')
    videoEl.setAttribute('position', '0 0.3 0')
    videoEl.setAttribute('width', '1.6')
    videoEl.setAttribute('height', '0.9')
    videoEl.setAttribute('rotation', '0 0 0')
    videoEl.setAttribute('animation', 'property: position; from: 0 0.2 0; to: 0 0.35 0; dur: 3000; loop: true; dir: alternate; easing: easeInOutSine')
    mindarImage.appendChild(videoEl)

    // Play when target found
    scene.addEventListener('arReady', () => {})
  }

  if (exp.experience_type === 'photo' && (exp.media_url || (exp.media_urls && exp.media_urls.length))) {
    const imgs = exp.media_urls?.length ? exp.media_urls : [exp.media_url]
    imgs.slice(0, 5).forEach((url, i) => {
      const plane = document.createElement('a-plane')
      plane.setAttribute('src', url)
      plane.setAttribute('width', '1.6')
      plane.setAttribute('height', '1.0')
      plane.setAttribute('position', `${i * 0.05} ${0.3 + i * 0.005} ${-i * 0.01}`)
      plane.setAttribute('rotation', `0 ${i * 2} 0`)
      plane.setAttribute('visible', i === 0 ? 'true' : 'false')
      plane.id = `photo-${i}`
      plane.setAttribute('animation__float', 'property: position; from: 0 0.25 0; to: 0 0.38 0; dur: 3500; loop: true; dir: alternate; easing: easeInOutSine')
      mindarImage.appendChild(plane)
    })
  }

  if (exp.experience_type === 'text') {
    const textMsg = exp.text_message || 'A gift for you ✦'

    // Background glow panel
    const bgPanel = document.createElement('a-plane')
    bgPanel.setAttribute('width', '1.8')
    bgPanel.setAttribute('height', '0.8')
    bgPanel.setAttribute('position', '0 0.35 -0.01')
    bgPanel.setAttribute('color', templateConfig.bg)
    bgPanel.setAttribute('opacity', '0.7')
    bgPanel.setAttribute('material', 'transparent: true')
    mindarImage.appendChild(bgPanel)

    // Text
    const textEl = document.createElement('a-text')
    textEl.setAttribute('value', textMsg)
    textEl.setAttribute('color', templateConfig.color)
    textEl.setAttribute('align', 'center')
    textEl.setAttribute('width', '1.6')
    textEl.setAttribute('position', '0 0.35 0')
    textEl.setAttribute('wrap-count', '28')
    textEl.setAttribute('font', templateConfig.font)
    textEl.setAttribute('animation__float', 'property: position; from: 0 0.3 0; to: 0 0.42 0; dur: 3000; loop: true; dir: alternate; easing: easeInOutSine')
    textEl.setAttribute('animation__glow', 'property: material.opacity; from: 0.85; to: 1; dur: 1500; loop: true; dir: alternate; easing: easeInOutSine')
    mindarImage.appendChild(textEl)

    // Particle sparkles
    for (let i = 0; i < 6; i++) {
      const spark = document.createElement('a-entity')
      const x = (Math.random() - 0.5) * 2
      const y = Math.random() * 0.8
      spark.setAttribute('position', `${x} ${y} 0.05`)
      spark.setAttribute('geometry', 'primitive: sphere; radius: 0.015')
      spark.setAttribute('material', `color: ${templateConfig.color}; emissive: ${templateConfig.color}; emissiveIntensity: 2`)
      spark.setAttribute('animation', `property: position; from: ${x} ${y} 0.05; to: ${x} ${y + 0.2} 0.05; dur: ${1500 + i * 300}; loop: true; dir: alternate; easing: easeInOutSine`)
      mindarImage.appendChild(spark)
    }
  }

  // Ambient light
  const light = document.createElement('a-light')
  light.setAttribute('type', 'ambient')
  light.setAttribute('color', '#fff')
  light.setAttribute('intensity', '1.5')
  scene.appendChild(light)

  scene.appendChild(mindarImage)
  container.appendChild(scene)
  return scene
}

// ─── 4. AR event handlers ────────────────────────────────────────────────────
function setupAREvents(scene, exp) {
  scene.addEventListener('arReady', () => {
    $('loading-screen').classList.add('hidden')
    $('scan-hint').style.display = 'flex'
  })

  scene.addEventListener('arError', () => {
    showError('AR initialisation failed. Please ensure camera access is granted and try in Chrome on Android or Safari on iOS.')
  })

  const target = scene.querySelector('[mindar-image-target]')
  if (target) {
    target.addEventListener('targetFound', () => {
      targetFound = true
      // Flash gold to signal detection
      const flash = $('found-flash')
      flash.classList.remove('flash')
      void flash.offsetWidth // reflow
      flash.classList.add('flash')
      // Update label briefly then hide scan overlay
      $('scan-label-text').textContent = '✦ Product found!'
      setTimeout(() => {
        $('scan-hint').style.display = 'none'
        showMediaOverlay(exp)
      }, 400)
    })

    target.addEventListener('targetLost', () => {
      targetFound = false
      // keep overlay open — don't close just because marker moved out of frame
    })
  }
}

function showMediaOverlay(exp) {
  const overlay = $('media-overlay')
  const vid     = $('overlay-video')
  const img     = $('overlay-photo')
  const txtWrap = $('overlay-text')
  const txtMsg  = $('overlay-text-msg')
  const btnCta  = $('btn-cta')

  // Reset
  vid.style.display = 'none'
  img.style.display = 'none'
  txtWrap.style.display = 'none'

  if (exp.experience_type === 'video' && exp.media_url) {
    vid.src = exp.media_url
    vid.style.display = 'block'
    vid.muted = false
    vid.play().catch(() => { vid.muted = true; vid.play().catch(() => {}) })
  } else if (exp.experience_type === 'photo') {
    const url = exp.media_urls?.[0] || exp.media_url
    if (url) { img.src = url; img.style.display = 'block' }
  } else if (exp.experience_type === 'text') {
    txtMsg.textContent = exp.text_message || 'A gift for you ✦'
    txtWrap.style.display = 'flex'
  }

  // CTA button
  if (exp.cta_label && exp.cta_url) {
    btnCta.textContent = exp.cta_label
    btnCta.style.display = 'inline-flex'
    btnCta.onclick = () => window.open(exp.cta_url, '_blank', 'noopener')
  }

  // Controls
  $('btn-replay').onclick = () => {
    if (exp.experience_type === 'video') { vid.currentTime = 0; vid.play().catch(() => {}) }
  }
  $('btn-share').onclick = async () => {
    const data = { title: 'ARgift — Open your gift!', text: 'Someone sent you an AR gift!', url: location.href }
    if (navigator.share) { try { await navigator.share(data) } catch {} }
    else { await navigator.clipboard.writeText(location.href); alert('Link copied!') }
  }
  $('btn-close').onclick = () => {
    overlay.classList.remove('active')
    vid.pause()
    $('scan-label-text').textContent = 'Scanning for product…'
    $('scan-hint').style.display = 'flex'
    ctaShown = false
  }

  overlay.classList.add('active')
}

// ─── 5. Main flow ─────────────────────────────────────────────────────────────
async function main() {
  setLoadingStatus('Reading your gift…', 10)

  productId = getProductId()
  if (!productId) {
    showError('No product ID found in the URL. Please scan the QR code again or ask the sender to reshare.')
    return
  }

  setLoadingStatus('Fetching experience data…', 30)
  try {
    experience = await fetchExperience(productId)
  } catch (err) {
    showError(err.message)
    return
  }

  // Always show permission screen first so browser triggers the camera prompt on user gesture
  setLoadingStatus('Ready…', 60)
  $('loading-screen').classList.add('hidden')
  $('permission-screen').style.display = 'flex'
}

async function launchAR() {
  setLoadingStatus('Starting camera…', 75)

  // Start our own camera stream and show it immediately
  let stream
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
    })
  } catch (err) {
    showError('Camera access denied. Please allow camera and reload.')
    return
  }

  const camFeed = $('camera-feed')
  camFeed.srcObject = stream
  await camFeed.play().catch(() => {})

  setLoadingStatus('Building AR scene…', 90)
  sceneEl = buildScene(experience)
  setupAREvents(sceneEl, experience)

  // Start AR tracking after scene is ready
  sceneEl.addEventListener('loaded', () => {
    setLoadingStatus('Ready! Point at your product…', 100)
    const system = sceneEl.systems['mindar-image-system']
    if (system) system.start()
  })
}

$('btn-allow-camera').addEventListener('click', async () => {
  $('permission-screen').style.display = 'none'
  $('loading-screen').classList.remove('hidden')
  await launchAR()
})

// Boot
main()
</script>
</body>
</html>
